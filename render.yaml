services:
  - type: web
    name: stock-system
    runtime: node
    buildCommand: |
      npm install --prefix client &&
      npm run build --prefix client &&
      npm install --prefix server &&
      npm run build --prefix server
    startCommand: node server/dist/src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stock-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "500"
      - key: AUTH_RATE_LIMIT_MAX
        value: "20"
      - key: INVOICE_MATCH_TOLERANCE_PERCENT
        value: "5"
      - key: ALLOWED_ORIGINS
        value: https://stock-system.onrender.com

databases:
  - name: stock-db
    databaseName: stock_system
    user: stock_user
    plan: free
