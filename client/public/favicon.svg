<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded square background -->
  <rect width="32" height="32" rx="7" fill="#1e40af"/>
  <!-- Warehouse roof (triangle) -->
  <polygon points="16,4 29,12 3,12" fill="#ffffff"/>
  <!-- Building body -->
  <rect x="4" y="12" width="24" height="16" rx="1" fill="#ffffff"/>
  <!-- Door (blue cutout) -->
  <rect x="12" y="20" width="8" height="8" fill="#1e40af"/>
  <!-- Left window -->
  <rect x="6" y="14.5" width="5" height="4" rx="1" fill="#1e40af"/>
  <!-- Right window -->
  <rect x="21" y="14.5" width="5" height="4" rx="1" fill="#1e40af"/>
</svg>